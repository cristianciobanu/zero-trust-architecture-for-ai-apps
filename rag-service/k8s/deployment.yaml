apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: rag-service
  labels:
    app.kubernetes.io/name: rag-service
    app.kubernetes.io/part-of: financial-qa
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-service
        app.kubernetes.io/part-of: financial-qa
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: rag-service
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: rag-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: rag-service
          image: ghcr.io/cristianciobanu/rag-service:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: QDRANT_HOST
              value: "qdrant.qdrant.svc.cluster.local"
            - name: QDRANT_PORT
              value: "6333"
            - name: OLLAMA_URL
              value: "http://ollama.ollama.svc.cluster.local:11434"
            - name: OLLAMA_MODEL
              value: "hf.co/bartowski/Mistral-7B-Instruct-v0.3-GGUF:Q4_K_M"
            - name: COLLECTION_NAME
              value: "financial_docs"
            - name: TOP_K
              value: "5"
            - name: DEV_MODE
              value: "false"
            # Keycloak OIDC — frontend UI loads keycloak.js and initialises the adapter
            - name: KEYCLOAK_URL
              value: "https://keycloak.example.com"
            - name: KEYCLOAK_REALM
              value: "financial-qa"
            - name: KEYCLOAK_CLIENT_ID
              value: "rag-ui"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          volumeMounts:
            - name: ui-overlay
              mountPath: /app/static/index.html
              subPath: index.html
              readOnly: true
            - name: ui-overlay
              mountPath: /app/static/admin.html
              subPath: admin.html
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: ui-overlay
          configMap:
            name: rag-ui-overlay
