apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: rag-service
  labels:
    app.kubernetes.io/name: rag-service
    app.kubernetes.io/part-of: financial-qa
  annotations:
    # Traffic arrives via Istio Gateway (mTLS), not directly from ALB
    app.kubernetes.io/managed-by: istio
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rag-service
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
